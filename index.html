<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Velocímetro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --accent: #ff6a00;
      --accent2: #ffaa00;
      --dim: #2a2a35;
      --text-muted: #555566;
      --text: #ccccdd;
      --green: #00e676;
      --red: #ff1744;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 16px 12px 20px;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      display: inline-block;
      margin-right: 6px;
      transition: background 0.4s;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.error  { background: var(--red);   box-shadow: 0 0 8px var(--red); }

    #gps-label { display: flex; align-items: center; }

    /* ── SPEED DISPLAY ── */
    .speed-block {
      text-align: center;
      line-height: 1;
    }

    #speed {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(120px, 38vw, 200px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -4px;
      transition: color 0.3s;
      text-shadow: 0 0 40px rgba(255,106,0,0.15);
    }

    #speed.warn  { color: var(--accent2); text-shadow: 0 0 40px rgba(255,170,0,0.4); }
    #speed.over  { color: var(--red);     text-shadow: 0 0 40px rgba(255,23,68,0.5); animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { opacity:1; } to { opacity:0.7; } }

    .unit {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: -8px;
    }

    /* ── ARC ── */
    .arc-wrap {
      position: relative;
      width: min(320px, 90vw);
      margin: 4px auto;
    }

    #arc-canvas { width: 100%; display: block; }

    /* ── STATS ROW ── */
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--dim);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 2px;
    }

    /* ── LIMIT CONTROL ── */
    .limit-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--dim);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .limit-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .limit-btn {
      background: var(--dim);
      border: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 700;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .limit-btn:active { background: var(--accent); }

    #limit-display {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      flex: 1;
    }

    .limit-off { color: var(--text-muted) !important; font-size: 16px !important; }

    /* ── BOTTOM BAR ── */
    .bottom {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    #accuracy { }
    #msg { text-align: right; color: var(--accent); min-height: 14px; }

    /* ── WAKE LOCK HINT ── */
    #wake-hint {
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- TOP -->
  <div class="topbar">
    <div id="gps-label"><span class="status-dot" id="dot"></span><span id="gps-status">Sin señal GPS</span></div>
    <div id="clock">--:--</div>
  </div>

  <!-- SPEED -->
  <div class="speed-block">
    <div id="speed">0</div>
    <div class="unit">km/h</div>
  </div>

  <!-- ARC -->
  <div class="arc-wrap">
    <canvas id="arc-canvas" width="320" height="160"></canvas>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Máxima</div>
      <div class="stat-value" id="max-speed">0<span>km/h</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Promedio</div>
      <div class="stat-value" id="avg-speed">0<span>km/h</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Distancia</div>
      <div class="stat-value" id="distance">0<span>km</span></div>
    </div>
  </div>

  <!-- LIMIT -->
  <div class="limit-row">
    <span class="limit-label">Límite</span>
    <button class="limit-btn" id="btn-down">−</button>
    <div id="limit-display" class="limit-off">OFF</div>
    <button class="limit-btn" id="btn-up">+</button>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div id="accuracy">Precisión: —</div>
    <div id="msg"></div>
  </div>

  <div id="wake-hint">Mantené la pantalla encendida desde Ajustes</div>

<script>
  // ── STATE ──
  let speedKmh    = 0;
  let maxSpeed    = 0;
  let totalDist   = 0;   // km
  let speedSum    = 0;
  let speedCount  = 0;
  let lastLat     = null, lastLon = null, lastTime = null;
  let limitKmh    = 0;   // 0 = OFF
  const LIMIT_STEPS = [0,40,50,60,80,100,110,120,130];
  let limitIdx    = 0;

  // ── DOM ──
  const $speed   = document.getElementById('speed');
  const $dot     = document.getElementById('dot');
  const $gpsLbl  = document.getElementById('gps-status');
  const $max     = document.getElementById('max-speed');
  const $avg     = document.getElementById('avg-speed');
  const $dist    = document.getElementById('distance');
  const $lim     = document.getElementById('limit-display');
  const $acc     = document.getElementById('accuracy');
  const $msg     = document.getElementById('msg');
  const $clock   = document.getElementById('clock');
  const canvas   = document.getElementById('arc-canvas');
  const ctx      = canvas.getContext('2d');

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    $clock.textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── ARC DRAW ──
  function drawArc(speed) {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const cx = W / 2, cy = H - 10;
    const R = H - 20;
    const startA = Math.PI;
    const endA   = 0;
    const maxSpeedArc = 160;
    const fraction = Math.min(speed / maxSpeedArc, 1);
    const currentA = startA + fraction * Math.PI;

    // track bg
    ctx.beginPath();
    ctx.arc(cx, cy, R, startA, endA, false);
    ctx.strokeStyle = '#1e1e28';
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.stroke();

    // colored fill
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0,   '#ff6a00');
    grad.addColorStop(0.6, '#ffaa00');
    grad.addColorStop(1,   '#ff1744');

    ctx.beginPath();
    ctx.arc(cx, cy, R, startA, currentA, false);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.stroke();

    // limit marker
    if (limitKmh > 0) {
      const lf = Math.min(limitKmh / maxSpeedArc, 1);
      const la = startA + lf * Math.PI;
      const mx = cx + R * Math.cos(la);
      const my = cy + R * Math.sin(la);
      ctx.beginPath();
      ctx.arc(mx, my, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#ff1744';
      ctx.fill();
    }

    // tick marks
    for (let v = 0; v <= maxSpeedArc; v += 20) {
      const f = v / maxSpeedArc;
      const a = startA + f * Math.PI;
      const inner = R - 14, outer = R + 4;
      ctx.beginPath();
      ctx.moveTo(cx + inner * Math.cos(a), cy + inner * Math.sin(a));
      ctx.lineTo(cx + outer * Math.cos(a), cy + outer * Math.sin(a));
      ctx.strokeStyle = '#333344';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // label
      if (v % 40 === 0) {
        const lx = cx + (R - 30) * Math.cos(a);
        const ly = cy + (R - 30) * Math.sin(a);
        ctx.font = '10px Share Tech Mono';
        ctx.fillStyle = '#444455';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v, lx, ly);
      }
    }
  }

  drawArc(0);

  // ── GEOLOCATION ──
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function onPosition(pos) {
    const { latitude: lat, longitude: lon, speed, accuracy } = pos.coords;
    const now = pos.timestamp;

    // speed from API (m/s) → km/h, fallback to haversine
    let kmh = 0;
    if (speed !== null && speed >= 0) {
      kmh = speed * 3.6;
    } else if (lastLat !== null) {
      const dt = (now - lastTime) / 3600000; // hours
      if (dt > 0) {
        const d = haversine(lastLat, lastLon, lat, lon);
        kmh = d / dt;
      }
    }

    // distance
    if (lastLat !== null) {
      totalDist += haversine(lastLat, lastLon, lat, lon);
    }

    lastLat = lat; lastLon = lon; lastTime = now;
    speedKmh = Math.round(kmh);

    if (speedKmh > maxSpeed) maxSpeed = speedKmh;
    if (speedKmh > 2) { speedSum += speedKmh; speedCount++; }

    // update UI
    $speed.textContent = speedKmh;
    $max.innerHTML  = maxSpeed + '<span>km/h</span>';
    $avg.innerHTML  = (speedCount ? Math.round(speedSum/speedCount) : 0) + '<span>km/h</span>';
    $dist.innerHTML = totalDist < 1
      ? Math.round(totalDist * 1000) + '<span>m</span>'
      : totalDist.toFixed(1) + '<span>km</span>';
    $acc.textContent = 'Precisión: ±' + Math.round(accuracy) + 'm';

    // color warning
    $speed.className = '';
    if (limitKmh > 0) {
      if (speedKmh >= limitKmh + 5) $speed.className = 'over';
      else if (speedKmh >= limitKmh - 5) $speed.className = 'warn';
    }

    // GPS status
    $dot.className = 'status-dot active';
    $gpsLbl.textContent = 'GPS activo';
    $msg.textContent = '';

    drawArc(speedKmh);
  }

  function onError(err) {
    $dot.className = 'status-dot error';
    $gpsLbl.textContent = 'Sin señal';
    $msg.textContent = err.code === 1 ? 'Permiso denegado' : 'Error GPS';
    drawArc(0);
  }

  if ('geolocation' in navigator) {
    $gpsLbl.textContent = 'Buscando GPS…';
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 500,
      timeout: 10000
    });
  } else {
    $dot.className = 'status-dot error';
    $gpsLbl.textContent = 'GPS no disponible';
  }

  // ── LIMIT BUTTONS ──
  document.getElementById('btn-up').addEventListener('click', () => {
    limitIdx = Math.min(limitIdx + 1, LIMIT_STEPS.length - 1);
    updateLimit();
  });
  document.getElementById('btn-down').addEventListener('click', () => {
    limitIdx = Math.max(limitIdx - 1, 0);
    updateLimit();
  });

  function updateLimit() {
    limitKmh = LIMIT_STEPS[limitIdx];
    if (limitKmh === 0) {
      $lim.textContent = 'OFF';
      $lim.className = 'limit-off';
    } else {
      $lim.textContent = limitKmh + ' km/h';
      $lim.className = '';
    }
    drawArc(speedKmh);
  }

  // ── WAKE LOCK (mantiene pantalla encendida si el navegador lo soporta) ──
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        await navigator.wakeLock.request('screen');
        document.getElementById('wake-hint').style.display = 'none';
      } catch(e) {}
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
</script>
</body>
</html>
